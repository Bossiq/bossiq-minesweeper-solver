name: Release
on:
  push:
    tags: [ "v*" ]
permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Build MSI + app-image (jpackage)
        run: ./gradlew.bat clean jpackage --no-daemon --stacktrace

      - name: Collect artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # MSI built by jpackage
          $msi = (Get-ChildItem build\jpackage\minesweeper-setup*.msi | Select-Object -First 1)
          if (-not $msi) { throw "MSI not found" }
          
          $appImageDir = "build\\jpackage\\Minesweeper"
          if (-not (Test-Path $appImageDir)) { throw "App image not found" }
          Compress-Archive -Path "$appImageDir\*" -DestinationPath "minesweeper-appimage.zip" -Force

          $zipHash = (Get-FileHash .\minesweeper-appimage.zip -Algorithm SHA256).Hash
          $msiHash = (Get-FileHash $msi.FullName -Algorithm SHA256).Hash
          @(
            "SHA256  minesweeper-appimage.zip  $zipHash"
            "SHA256  $($msi.Name)             $msiHash"
          ) | Out-File -FilePath checksums.txt -Encoding ASCII

          Copy-Item $msi.FullName .\minesweeper-setup.msi -Force

      - name: Create GitHub Release (attach assets)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            minesweeper-setup.msi
            minesweeper-appimage.zip
            checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true
