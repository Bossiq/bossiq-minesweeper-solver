name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-jlink:
    name: Windows portable image
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Build jlink image
        run: ./gradlew.bat jlink --no-daemon --stacktrace

      - name: Zip portable image
        run: Compress-Archive -Path build\image\* -DestinationPath minesweeper-image.zip

      - name: Create GitHub Release (and upload zip)
        uses: softprops/action-gh-release@v2
        with:
          files: minesweeper-image.zip
          draft: false
          prerelease: false
          generate_release_notes: true
